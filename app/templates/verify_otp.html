{% extends "base.html" %}
{% block title %}Verify OTP - MemoryBell{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-sm animate-fade-in-up">
        <div class="text-center mb-8">
            <p class="text-2xl font-black tracking-tight mb-4">Memory<span class="text-violet-600">Bell</span></p>
            <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
            </div>
            <h1 class="text-2xl font-bold">Verify Your Phone</h1>
            <p class="text-gray-500 mt-2 text-sm">We sent a 6-digit code to <strong class="text-black">{{ phone }}</strong></p>
        </div>

        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5 uppercase tracking-wide">Enter OTP Code</label>
                <input type="text" name="otp_code" required maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
                    class="w-full px-4 py-4 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-black transition text-center text-2xl font-bold tracking-[0.5em]"
                    placeholder="------">
            </div>
            <button type="submit"
                class="w-full py-3 bg-black text-white rounded-xl font-semibold text-sm hover:bg-gray-800 hover:scale-[1.01] active:scale-[0.99] transition-all shadow-lg shadow-black/10">
                Verify & Create Account
            </button>
        </form>

        <div class="text-center mt-5">
            <p class="text-sm text-gray-400 mb-2">Didn't receive the code?</p>
            <form method="POST" action="/resend-otp" class="inline">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <button type="submit" class="text-sm text-violet-600 font-semibold hover:underline">
                    Resend OTP
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-400 mt-6">
            <a href="/signup" class="hover:text-black transition">Go back to sign up</a>
        </p>
    </div>
</div>
{% endblock %}
