{% extends "base.html" %}
{% block title %}New Reminder - MemoryBell{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-12 px-8">
    <h1 class="text-3xl font-bold mb-2">Create Reminder</h1>
    <p class="text-gray-500 mb-8">Add a new date to remember</p>

    <form method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-medium mb-1.5">Event Name</label>
            <input type="text" name="event_name" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                placeholder="Mom's Birthday">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1.5">Event Type</label>
                <select name="event_type"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm bg-white">
                    <option value="birthday">Birthday</option>
                    <option value="anniversary">Anniversary</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1.5">Date</label>
                <input type="date" name="event_date" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1.5">Contact Name</label>
                <input type="text" name="contact_name"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                    placeholder="Sarah">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1.5">Contact Phone</label>
                <input type="tel" name="contact_phone"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                    placeholder="+1234567890">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1.5">Notify By</label>
                <select name="notify_method"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm bg-white">
                    <option value="whatsapp">WhatsApp</option>
                    <option value="call">Phone Call</option>
                    <option value="both">Both</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1.5">Remind Me</label>
                <select name="reminder_before"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm bg-white">
                    <option value="same_day">Same Day</option>
                    <option value="1_day_before">1 Day Before</option>
                    <option value="3_days_before">3 Days Before</option>
                    <option value="7_days_before">7 Days Before</option>
                </select>
            </div>
        </div>

        <button type="submit"
            class="w-full py-3 bg-black text-white rounded-xl font-medium hover:bg-gray-800 transition text-sm">
            Create Reminder
        </button>
    </form>
</div>
{% endblock %}
