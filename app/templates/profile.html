{% extends "base.html" %}
{% block title %}Profile - MemoryBell{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-12 px-8">
    <h1 class="text-3xl font-bold mb-8">Profile</h1>

    <!-- Update Profile -->
    <form method="POST" action="/profile" class="space-y-5 mb-12">
        <div>
            <label class="block text-sm font-medium mb-1.5">Name</label>
            <input type="text" name="name" value="{{ user.name }}"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1.5">Email</label>
            <input type="email" value="{{ user.email }}" disabled
                class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-400 text-sm">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1.5">Phone</label>
                <input type="tel" name="phone_number" value="{{ user.phone_number }}"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1.5">WhatsApp</label>
                <input type="tel" name="whatsapp_number" value="{{ user.whatsapp_number }}"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1.5">Timezone</label>
            <input type="text" name="timezone" value="{{ user.timezone or 'UTC' }}"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                placeholder="UTC">
        </div>
        <button type="submit"
            class="w-full py-3 bg-black text-white rounded-xl font-medium hover:bg-gray-800 transition text-sm">
            Update Profile
        </button>
    </form>

    <!-- Change Password -->
    <div class="border-t border-gray-100 pt-8 mb-12">
        <h2 class="text-lg font-semibold mb-4">Change Password</h2>
        <form method="POST" action="/profile/change-password" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1.5">Current Password</label>
                <input type="password" name="current_password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1.5">New Password</label>
                <input type="password" name="new_password" required minlength="6"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm">
            </div>
            <button type="submit"
                class="px-6 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition text-sm">
                Change Password
            </button>
        </form>
    </div>

    <!-- Delete Account -->
    <div class="border-t border-gray-100 pt-8">
        <h2 class="text-lg font-semibold mb-2 text-red-600">Danger Zone</h2>
        <p class="text-sm text-gray-500 mb-4">Permanently delete your account and all reminders.</p>
        <form method="POST" action="/profile/delete" onsubmit="return confirm('Are you sure? This cannot be undone.')">
            <button type="submit"
                class="px-6 py-2.5 bg-red-50 text-red-600 border border-red-200 rounded-xl font-medium hover:bg-red-100 transition text-sm">
                Delete Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
