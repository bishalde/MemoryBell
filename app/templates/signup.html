{% extends "base.html" %}
{% block title %}Sign Up - MemoryBell{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 px-8">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold">Create your account</h1>
        <p class="text-gray-500 mt-2">Start remembering what matters</p>
    </div>

    <form method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-medium mb-1.5">Full Name</label>
            <input type="text" name="name" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                placeholder="John Doe">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1.5">Email</label>
            <input type="email" name="email" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                placeholder="you@example.com">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1.5">Password</label>
            <input type="password" name="password" required minlength="6"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                placeholder="Min 6 characters">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1.5">Phone Number</label>
            <input type="tel" name="phone_number"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                placeholder="+1234567890">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1.5">WhatsApp Number</label>
            <input type="tel" name="whatsapp_number"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition text-sm"
                placeholder="+1234567890 (leave blank to use phone)">
        </div>
        <button type="submit"
            class="w-full py-3 bg-black text-white rounded-xl font-medium hover:bg-gray-800 transition text-sm">
            Create Account
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account? <a href="/login" class="text-black font-medium hover:underline">Log in</a>
    </p>
</div>
{% endblock %}
