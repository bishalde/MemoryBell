{% extends "base.html" %}
{% block title %}Sign Up - MemoryBell{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-sm animate-fade-in-up">
        <!-- Logo -->
        <div class="text-center mb-8">
            <p class="text-2xl font-black tracking-tight mb-4">Memory<span class="text-violet-600">Bell</span></p>
            <h1 class="text-2xl font-bold">Create your account</h1>
            <p class="text-gray-500 mt-1 text-sm">Start remembering what matters</p>
        </div>

        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5 uppercase tracking-wide">Full Name</label>
                <div class="relative">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                    <input type="text" name="name" required
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-black transition text-sm"
                        placeholder="John Doe">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5 uppercase tracking-wide">Email</label>
                <div class="relative">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                    <input type="email" name="email" required
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-black transition text-sm"
                        placeholder="you@example.com">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5 uppercase tracking-wide">Password</label>
                <div class="relative">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                    <input type="password" name="password" required minlength="6"
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-black transition text-sm"
                        placeholder="Min 6 characters">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5 uppercase tracking-wide">Phone Number (for OTP verification)</label>
                <div class="grid grid-cols-5 gap-2">
                    <select name="country_code"
                        class="col-span-2 px-3 py-3 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-black transition text-sm appearance-none cursor-pointer">
                        <option value="+1">+1 (US/CA)</option>
                        <option value="+44">+44 (UK)</option>
                        <option value="+91" selected>+91 (IN)</option>
                        <option value="+61">+61 (AU)</option>
                        <option value="+49">+49 (DE)</option>
                        <option value="+33">+33 (FR)</option>
                        <option value="+81">+81 (JP)</option>
                        <option value="+86">+86 (CN)</option>
                        <option value="+55">+55 (BR)</option>
                        <option value="+52">+52 (MX)</option>
                        <option value="+234">+234 (NG)</option>
                        <option value="+27">+27 (ZA)</option>
                        <option value="+254">+254 (KE)</option>
                        <option value="+971">+971 (UAE)</option>
                        <option value="+966">+966 (SA)</option>
                        <option value="+82">+82 (KR)</option>
                        <option value="+39">+39 (IT)</option>
                        <option value="+34">+34 (ES)</option>
                        <option value="+62">+62 (ID)</option>
                        <option value="+63">+63 (PH)</option>
                        <option value="+66">+66 (TH)</option>
                        <option value="+65">+65 (SG)</option>
                        <option value="+60">+60 (MY)</option>
                        <option value="+92">+92 (PK)</option>
                        <option value="+880">+880 (BD)</option>
                        <option value="+94">+94 (LK)</option>
                        <option value="+977">+977 (NP)</option>
                    </select>
                    <input type="tel" name="phone_number" required
                        class="col-span-3 px-4 py-3 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-black transition text-sm"
                        placeholder="9876543210">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5 uppercase tracking-wide">WhatsApp (optional)</label>
                <input type="tel" name="whatsapp_number"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-black transition text-sm"
                    placeholder="Leave blank if same as phone">
            </div>
            <button type="submit"
                class="w-full py-3 bg-black text-white rounded-xl font-semibold text-sm hover:bg-gray-800 hover:scale-[1.01] active:scale-[0.99] transition-all shadow-lg shadow-black/10">
                Send OTP & Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a href="/login" class="text-black font-semibold hover:underline">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
